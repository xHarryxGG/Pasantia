<table class="table users-table">
    <thead>
        <tr>
            <th>Email</th>
            <th>Nombre</th>
            <th>Contraseña</th>
            <th>Rol</th>
            <th>Departamento</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.email }}</td>
            <td><input type="text" name="full_name" value="{{ u.full_name or '' }}" form="form-{{ u.id }}" class="inline-input"></td>
            <td>
                <div class="password-cell">
                    <input type="password" id="pw-field-{{ u.id }}" class="inline-input pw-field" value="••••••••" readonly>
                    <button type="button"
                            class="btn btn-small btn-icon pw-edit-btn"
                            data-user-id="{{ u.id }}"
                            data-user-email="{{ u.email }}"
                            title="Cambiar contraseña">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2.5"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                    </button>
                </div>
            </td>
            <td>
                <select name="role" form="form-{{ u.id }}" class="role-select">
                    {% for r in roles %}
                        <option value="{{ r }}" {{ 'selected' if u.role == r else '' }}>{{ r }}</option>
                    {% endfor %}
                </select>
            </td>
            <td>
                <select name="department_id" form="form-{{ u.id }}">
                    <option value="">-- Ninguno --</option>
                    {% for d in departments %}
                    <option value="{{ d.id }}" {{ 'selected' if u.department_id and d.id|string == u.department_id|string else '' }}>{{ d.code }}</option>
                    {% endfor %}
                </select>
            </td>
            <td class="user-actions-cell">
                <form id="form-{{ u.id }}" method="post" action="/admin/users/{{ u.id }}"
                    hx-post="/admin/users/{{ u.id }}"
                    hx-target="#users-table-section"
                    hx-swap="innerHTML">
                    <button type="submit" class="btn btn-small btn-save">
                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2.5"
                             stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        Guardar
                    </button>
                </form>
                <button type="button" class="btn btn-small btn-danger"
                    hx-delete="/admin/users/{{ u.id }}"
                    hx-target="#users-table-section"
                    hx-swap="innerHTML"
                    hx-confirm="¿Está seguro de que desea eliminar este usuario? Esta acción no se puede deshacer.">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2.5"
                         stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                        <path d="M10 11v6M14 11v6"/>
                        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                    </svg>
                    Eliminar
                </button>
            </td>
        </tr>
        {% endfor %}
        {% if not users %}
        <tr>
            <td colspan="6" style="text-align:center; color: var(--text-muted);">No hay usuarios registrados.</td>
        </tr>
        {% endif %}
    </tbody>
</table>
